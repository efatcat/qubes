<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qubes · Элегантный хаб</title>
  <!-- ШРИФТ UNBOUNDED -->
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0505;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Unbounded', 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    /* Главный контейнер – хаб с изысканной тенью и рамкой */
    .hub {
      max-width: 780px;
      width: 100%;
      background: #0f0808;
      background-image: radial-gradient(circle at 20% 30%, #1f0b0b 0%, #0a0303 90%);
      border: 1px solid #3a1818;
      border-radius: 2.5rem;
      padding: 2.8rem 2.5rem 3rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #551c1c inset, 0 0 20px #66000033;
      transition: box-shadow 0.25s ease;
      position: relative;
      backdrop-filter: blur(1px);
    }

    /* Заголовок – минималистичный акцент */
    .hub-header {
      text-align: center;
      margin-bottom: 2.8rem;
      letter-spacing: 3px;
      font-weight: 300;
      color: #b15656;
      text-transform: uppercase;
      font-size: 0.7rem;
      border-bottom: 1px solid #2d1212;
      padding-bottom: 1rem;
      opacity: 0.5;
      text-shadow: 0 0 6px #7a2a2a55;
      font-family: 'Unbounded', sans-serif;
    }

    /* Список строк – 4 основные */
    .hub-lines {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    /* Каждая строка – элегантный элемент с бордюром */
    .line {
      position: relative;
      background: #110707;
      border: 1px solid #3a1a1a;
      border-radius: 3rem;
      padding: 1rem 2rem;
      color: #d4b0b0;
      font-size: 1.1rem;
      font-weight: 350;
      letter-spacing: 0.5px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 0 6px #2f0e0e33;
      text-shadow: 0 0 3px #641e1e44;
      backdrop-filter: blur(2px);
      background: linear-gradient(145deg, #130808, #0b0404);
      z-index: 1;
      overflow: hidden;
      font-family: 'Unbounded', sans-serif;
      text-decoration: none;
      color: #d4b0b0;
      display: block;
    }

    /* Псевдоэлемент для тонкого свечения */
    .line::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 3rem;
      padding: 1px;
      background: linear-gradient(135deg, #82222233, #3f0f0f33);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.5;
    }

    /* Текст внутри строки – дополнительный слой */
    .line span {
      position: relative;
      z-index: 2;
      display: inline-block;
      transition: transform 0.2s ease;
    }

    /* Бейдж "новое" – в стиле хаба */
    .badge-new {
      position: relative;
      z-index: 2;
      background: rgba(180, 30, 30, 0.2);
      font-size: 0.5rem;
      font-weight: 500;
      padding: 0.15rem 0.6rem;
      border-radius: 40px;
      color: #d47a7a;
      border: 1px solid rgba(180, 30, 30, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Unbounded', sans-serif;
      backdrop-filter: blur(4px);
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    /* ===== Эффект при наведении ===== */
    .line:hover {
      transform: scale(1.03) translateY(-2px);
      background: #170a0a;
      border-color: #aa3a3a;
      box-shadow: 0 0 30px #b13a3a55, 0 0 10px #a52a2a88, 0 0 2px #ff5e5e;
      color: #f0d0d0;
      text-shadow: 0 0 12px #d04545, 0 0 25px #a02222;
      transition: all 0.18s cubic-bezier(0.15, 0.9, 0.3, 1.2);
    }

    /* Глитч-эффект при наведении – расширение + артефакты */
    .line:hover::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 3rem;
      background: repeating-linear-gradient(
        45deg,
        rgba(200, 20, 20, 0.03) 0px,
        rgba(200, 20, 20, 0.03) 8px,
        rgba(255, 0, 0, 0.01) 8px,
        rgba(255, 0, 0, 0.01) 16px
      );
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: screen;
      animation: glitchPulse 0.25s infinite alternate;
    }

    /* Дополнительный глитч-слой: цветные сдвиги */
    .line:hover .glitch-flicker {
      display: block;
    }

    .glitch-flicker {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 3rem;
      background: transparent;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: overlay;
      box-shadow: 
        inset 0 0 30px #ff000022,
        inset 0 0 10px #ff555544,
        0 0 40px #ff222211;
      animation: glitchShift 0.15s infinite alternate;
    }

    /* Анимации глитча */
    @keyframes glitchPulse {
      0% { opacity: 0.2; transform: translateX(0) skewX(0deg); }
      100% { opacity: 0.7; transform: translateX(2px) skewX(1deg); }
    }

    @keyframes glitchShift {
      0% { transform: translate(-1px, 0) scale(1.01); opacity: 0.3; }
      100% { transform: translate(2px, -1px) scale(0.99); opacity: 0.6; }
    }

    /* Дополнительный «сбойный» текст внутри строки при ховере */
    .line:hover span {
      animation: textGlitch 0.2s infinite alternate;
    }

    @keyframes textGlitch {
      0% { transform: translate(0, 0) skewX(0deg); text-shadow: 2px 0 #ff333388, -1px 0 #00aaff66; }
      25% { transform: translate(-1px, 0.5px) skewX(0.5deg); text-shadow: -2px 0 #ff333388, 1px 0 #00aaff66; }
      50% { transform: translate(1px, -0.5px) skewX(-0.5deg); text-shadow: 1px 0 #ff333388, -2px 0 #00aaff66; }
      100% { transform: translate(0, 0) skewX(0deg); text-shadow: 0px 0 #ff333388, 0px 0 #00aaff66; }
    }

    /* Эффект расширения уже заложен в scale, но добавим ширину/высоту для плавности */
    .line:hover {
      padding: 1.2rem 2.5rem; /* расширение */
      letter-spacing: 1.2px;
    }

    /* Строка 5 – скрыта, появляется при прокрутке вниз (в контейнере) */
    .hidden-line-wrapper {
      margin-top: 1.2rem;
      padding-top: 1rem;
      border-top: 1px dashed #3a1a1a55;
      text-align: center;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.2), opacity 0.5s ease, margin 0.3s ease;
      visibility: hidden;
    }

    /* Когда хаб в зоне прокрутки – показываем пятую строку */
    .hub.scrolled .hidden-line-wrapper {
      max-height: 120px;
      opacity: 1;
      visibility: visible;
      margin-top: 1.8rem;
      padding-top: 1.5rem;
    }

    /* Стиль пятой строки – такая же элегантная, но чуть приглушённая */
    .line-extra {
      background: #120707;
      border: 1px solid #4a2020;
      border-radius: 3rem;
      padding: 0.9rem 2rem;
      color: #b07a7a;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 1px;
      display: inline-block;
      backdrop-filter: blur(2px);
      background: linear-gradient(145deg, #160a0a, #0c0505);
      box-shadow: 0 0 8px #2d0e0e44;
      text-shadow: 0 0 2px #852b2b66;
      transition: all 0.3s ease;
      width: auto;
      padding-left: 2.5rem;
      padding-right: 2.5rem;
      border-color: #5e2a2a;
      font-family: 'Unbounded', sans-serif;
      cursor: pointer;
      text-decoration: none;
      color: #b07a7a;
    }

    .line-extra:hover {
      background: #1e0d0d;
      border-color: #b33e3e;
      box-shadow: 0 0 20px #a5363688;
      color: #f0cfcf;
      text-shadow: 0 0 8px #d04444;
      transform: scale(1.02);
    }

    /* Скрасим скролл (для красоты) */
    .hub::-webkit-scrollbar {
      width: 5px;
      background: #1e0b0b;
      border-radius: 20px;
    }
    .hub::-webkit-scrollbar-thumb {
      background: #8f2e2e;
      border-radius: 20px;
    }

    /* Адаптив */
    @media (max-width: 500px) {
      .hub { padding: 1.8rem 1.2rem; }
      .line { font-size: 0.85rem; padding: 0.8rem 1rem; }
      .line:hover { padding: 1rem 1.8rem; }
      .hub-header { font-size: 0.6rem; }
      .line-extra { font-size: 0.8rem; padding: 0.7rem 1.2rem; }
    }

    /* Дополнительный акцент – красное свечение в углах */
    .hub::before {
      content: '';
      position: absolute;
      top: -2px;
      left: 20%;
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #af3a3a88, transparent);
      filter: blur(2px);
    }
    .hub::after {
      content: '';
      position: absolute;
      bottom: -2px;
      right: 20%;
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #af3a3a88, transparent);
      filter: blur(2px);
    }

    /* Логотип в заголовке */
    .hub-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 0.5rem;
    }
    .site-logo {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 12px;
      background: #1a0a0a;
      border: 1px solid #3a1818;
      flex-shrink: 0;
    }
    .hub-title {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e8b0b0, #c06060);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Unbounded', sans-serif;
    }
  </style>
</head>
<body>
  <div class="hub" id="hubContainer">
    <div class="hub-header">
      <div class="hub-logo">
        <img class="site-logo" src="https://sun9-39.userapi.com/s/v1/ig2/CBiPFP8Y5S72VS0NbgcLRL-FTqxvA3RtJbH2yhCJqCGvKsiilkf2Gm3_CwXAEDvlxvvdKqq9SUbuehSlxhb1GU87.jpg?quality=95&as=32x32,48x48,72x72,108x108,160x160,240x240,360x359,480x479,540x539,599x598&from=bu&cs=599x0" alt="Qubes">
        <span class="hub-title">Qubes</span>
      </div>
    </div>

    <!-- 4 основные строки – версии игры -->
    <div class="hub-lines">
      <a href="https://efatcat.github.io/kolblocks/ver2/summer" class="line" target="_blank" rel="noopener noreferrer">
        <span>✦ ver2 Summer (биомы)</span>
        <span class="badge-new">новое</span>
        <div class="glitch-flicker"></div>
      </a>
      <a href="https://efatcat.github.io/kolblocks/ver2/elo" class="line" target="_blank" rel="noopener noreferrer">
        <span>✦ ver2 Elo (эло + кейсы)</span>
        <div class="glitch-flicker"></div>
      </a>
      <a href="https://efatcat.github.io/kolblocks/ver2" class="line" target="_blank" rel="noopener noreferrer">
        <span>✦ ver2 (новые функции)</span>
        <div class="glitch-flicker"></div>
      </a>
      <a href="https://efatcat.github.io/kolblocks/ver1" class="line" target="_blank" rel="noopener noreferrer">
        <span>✦ ver1 (выпуск Qubes)</span>
        <div class="glitch-flicker"></div>
      </a>
    </div>

    <!-- Строка 5 – появляется при прокрутке (VK сообщество) -->
    <div class="hidden-line-wrapper">
      <a href="https://vk.com/club237311687" class="line-extra" target="_blank" rel="noopener noreferrer">
        📱  vk.com/club237311687  ·  все обновления
      </a>
    </div>

    <!-- Маленькая подпись внизу -->
    <div style="margin-top: 1.8rem; text-align: center; font-size: 0.6rem; color: #4d2626; letter-spacing: 2px; opacity: 0.4; border-top: 1px solid #2b1212; padding-top: 1rem; font-family: 'Unbounded', sans-serif;">
      scroll · открой тень
    </div>
  </div>

  <script>
    (function() {
      const hub = document.getElementById('hubContainer');

      function checkScroll() {
        if (!hub) return;

        const rect = hub.getBoundingClientRect();
        const windowHeight = window.innerHeight || document.documentElement.clientHeight;
        
        const threshold = 0.75;
        const hubVisiblePart = Math.min(1, (Math.min(rect.bottom, windowHeight) - Math.max(rect.top, 0)) / rect.height);
        
        if (hubVisiblePart > threshold || rect.bottom <= windowHeight) {
          hub.classList.add('scrolled');
        } else {
          hub.classList.remove('scrolled');
        }

        if (rect.bottom <= windowHeight + 50) {
          hub.classList.add('scrolled');
        }
      }

      window.addEventListener('load', checkScroll);
      window.addEventListener('resize', checkScroll);
      window.addEventListener('scroll', checkScroll);
      
      setTimeout(checkScroll, 100);
    })();
  </script>

  <style>
    .hub.scrolled .hidden-line-wrapper {
      max-height: 180px;
      opacity: 1;
      visibility: visible;
      margin-top: 2rem;
      padding-top: 1.5rem;
      transition: max-height 0.5s cubic-bezier(0.15, 1, 0.3, 1), opacity 0.4s ease, margin 0.3s ease;
    }
    .line-extra {
      transition: all 0.3s ease;
    }
  </style>
</body>
</html>
